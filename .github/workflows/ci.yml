name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint, test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npx eslint "src/**/*.ts"
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
